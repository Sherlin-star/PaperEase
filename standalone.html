<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperEase - 英文论文阅读助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background-color: #F9FAFB;
      color: #1F2937;
      overflow: hidden;
    }
    
    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }
    
    .sidebar {
      width: 64px;
      background-color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      border-right: 1px solid #1e293b;
      flex-shrink: 0;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
    }
    
    .sidebar-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }
    
    .sidebar-btn:hover {
      background-color: #1e293b;
      color: #e2e8f0;
    }
    
    .sidebar-btn.active {
      background-color: #4f46e5;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    
    .header {
      height: 56px;
      background-color: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header-title h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
    }
    
    .header-title span {
      color: #94a3b8;
      font-size: 14px;
    }
    
    .header-title .filename {
      color: #64748b;
      font-size: 14px;
    }
    
    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .upload-btn:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
    }
    
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .pdf-container {
      flex: 1;
      background-color: #e2e8f0;
      overflow: auto;
      padding: 32px;
    }
    
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
    }
    
    .empty-icon {
      width: 96px;
      height: 96px;
      background-color: #cbd5e1;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    
    .empty-state h2 {
      font-size: 20px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 12px;
    }
    
    .empty-state p {
      color: #64748b;
      text-align: center;
      max-width: 400px;
      margin-bottom: 32px;
      font-size: 14px;
    }
    
    .empty-state .upload-btn {
      padding: 12px 24px;
      font-size: 16px;
    }
    
    .pdf-preview {
      background: white;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      margin: 0 auto;
      padding: 32px;
      max-width: 800px;
      border-radius: 8px;
    }
    
    .pdf-preview h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1e293b;
    }
    
    .pdf-preview p {
      color: #475569;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    
    .pdf-preview .info-box {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
    }
    
    .pdf-preview .info-box p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .ai-panel {
      width: 400px;
      background-color: white;
      border-left: 1px solid #e2e8f0;
      flex-shrink: 0;
      box-shadow: -4px 0 15px -3px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }
    
    .ai-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f8fafc;
    }
    
    .ai-header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1e293b;
      font-size: 14px;
    }
    
    .model-selector {
      position: relative;
    }
    
    .model-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .model-btn:hover {
      background-color: #f8fafc;
    }
    
    .model-dropdown {
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 4px;
      width: 128px;
      background-color: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      display: none;
      z-index: 100;
    }
    
    .model-dropdown.show {
      display: block;
    }
    
    .model-option {
      width: 100%;
      padding: 8px 12px;
      text-align: left;
      background: transparent;
      border: none;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .model-option:hover {
      background-color: #f8fafc;
    }
    
    .model-option.active {
      color: #4f46e5;
      background-color: #eef2ff;
    }
    
    .model-option:first-child {
      border-radius: 8px 8px 0 0;
    }
    
    .model-option:last-child {
      border-radius: 0 0 8px 8px;
    }
    
    .ai-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .empty-ai {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 192px;
      color: #94a3b8;
      text-align: center;
    }
    
    .empty-ai svg {
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-ai p {
      font-size: 14px;
      line-height: 1.5;
    }
    
    .selected-text {
      border-left: 4px solid #4f46e5;
      background: linear-gradient(90deg, #eef2ff 0%, #ffffff 100%);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .selected-text-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    
    .selected-text p {
      font-family: Georgia, serif;
      font-style: italic;
      color: #334155;
      line-height: 1.6;
      font-size: 14px;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }
    
    .action-btn.primary {
      background-color: #4f46e5;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
    }
    
    .action-btn.secondary {
      background-color: #f1f5f9;
      color: #334155;
    }
    
    .action-btn.secondary:hover {
      background-color: #e2e8f0;
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .result-area {
      border-top: 1px solid #e2e8f0;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .result-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    
    .result-content {
      font-size: 14px;
      color: #334155;
      line-height: 1.7;
    }
    
    .result-content p {
      margin-bottom: 12px;
    }
    
    .result-content strong {
      color: #1e293b;
      font-weight: 600;
    }
    
    .result-content ul {
      padding-left: 24px;
      margin-bottom: 12px;
    }
    
    .result-content li {
      margin-bottom: 4px;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.show {
      display: flex;
    }
    
    .modal {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 448px;
      margin: 0 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }
    
    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f8fafc;
    }
    
    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1e293b;
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .modal-close:hover {
      background-color: #e2e8f0;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .api-input-group {
      margin-bottom: 16px;
    }
    
    .api-input-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
    }
    
    .api-input-wrapper {
      position: relative;
    }
    
    .api-input-wrapper svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }
    
    .api-input {
      width: 100%;
      padding: 10px 12px 10px 40px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .api-input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background-color: #f8fafc;
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }
    
    .btn-secondary {
      background-color: transparent;
      color: #475569;
    }
    
    .btn-secondary:hover {
      background-color: #e2e8f0;
    }
    
    .btn-primary {
      background-color: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary:hover {
      background-color: #4338ca;
    }
    
    .btn-success {
      background-color: #16a34a;
    }
    
    .loading {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .loading-line {
      height: 16px;
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
    }
    
    .loading-line:nth-child(1) {
      width: 75%;
    }
    
    .loading-line:nth-child(2) {
      width: 100%;
    }
    
    .loading-line:nth-child(3) {
      width: 83.33%;
    }
    
    @keyframes loading {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      
      <nav style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
        <button class="sidebar-btn active" title="文档">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        </button>
        <button class="sidebar-btn" title="历史">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button class="sidebar-btn" title="收藏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
          </svg>
        </button>
      </nav>
      
      <button class="sidebar-btn" style="margin-top: auto;" title="设置" onclick="openSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </aside>
    
    <div class="main-content">
      <header class="header">
        <div class="header-title">
          <h1>PaperEase</h1>
          <span>|</span>
          <span class="filename" id="filename">未选择文档</span>
        </div>
        
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          上传 PDF
        </button>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;" onchange="handleFileSelect(event)">
      </header>
      
      <div class="content-area">
        <div class="pdf-container" id="pdfContainer" onmouseup="handleTextSelection()">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <line x1="10" y1="9" x2="8" y2="9"/>
              </svg>
            </div>
            <h2>上传 PDF 文件开始阅读</h2>
            <p>支持拖拽上传或点击下方按钮选择文件</p>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              选择 PDF 文件
            </button>
          </div>
          
          <div class="pdf-preview" id="pdfPreview" style="display: none;">
            <h2>PDF 预览</h2>
            <p>文件名: <span id="previewFilename"></span></p>
            <p>文件大小: <span id="previewSize"></span> MB</p>
            <div class="info-box">
              <p>PDF 内容将在这里显示。在实际应用中，这里会渲染 PDF 页面内容。</p>
              <p>提示：您可以选中这段文字来测试 AI 功能。</p>
            </div>
          </div>
        </div>
        
        <div class="ai-panel">
          <div class="ai-header">
            <div class="ai-header-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                <path d="M5 3v4"/>
                <path d="M19 17v4"/>
                <path d="M3 5h4"/>
                <path d="M17 19h4"/>
              </svg>
              AI 助手
            </div>
            <div class="model-selector">
              <button class="model-btn" onclick="toggleModelMenu()">
                <span id="currentModel">DeepSeek</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m6 9 6 6 6-6"/>
                </svg>
              </button>
              <div class="model-dropdown" id="modelDropdown">
                <button class="model-option active" onclick="selectModel('deepseek')">DeepSeek</button>
                <button class="model-option" onclick="selectModel('groq')">Groq</button>
                <button class="model-option" onclick="selectModel('kimi')">Kimi</button>
                <button class="model-option" onclick="selectModel('silicon')">硅基流动</button>
              </div>
            </div>
          </div>
          
          <div class="ai-content" id="aiContent">
            <div class="empty-ai" id="emptyAi">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="21" y1="10" x2="3" y2="10"/>
                <line x1="21" y1="6" x2="3" y2="6"/>
                <line x1="21" y1="14" x2="3" y2="14"/>
                <line x1="21" y1="18" x2="3" y2="18"/>
              </svg>
              <p>在 PDF 中划选文本<br/>AI 将为您翻译、解释或总结</p>
            </div>
            
            <div id="aiActions" style="display: none;">
              <div class="selected-text">
                <div class="selected-text-label">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="21" y1="10" x2="3" y2="10"/>
                    <line x1="21" y1="6" x2="3" y2="6"/>
                    <line x1="21" y1="14" x2="3" y2="14"/>
                    <line x1="21" y1="18" x2="3" y2="18"/>
                  </svg>
                  已选文本
                </div>
                <p id="selectedTextDisplay">"</p>
              </div>
              
              <div class="action-buttons">
                <button class="action-btn" onclick="handleAIAction('translate')">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m5 8 6 6"/>
                    <path d="m4 14 6-6 2-3"/>
                    <path d="M2 5h12"/>
                    <path d="M7 2h1"/>
                    <path d="m22 22-5-10-5 10"/>
                    <path d="M14 18h6"/>
                  </svg>
                  翻译
                </button>
                <button class="action-btn" onclick="handleAIAction('explain')">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                  </svg>
                  解释
                </button>
                <button class="action-btn" onclick="handleAIAction('summarize')">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="21" y1="10" x2="3" y2="10"/>
                    <line x1="21" y1="6" x2="3" y2="6"/>
                    <line x1="21" y1="14" x2="3" y2="14"/>
                    <line x1="21" y1="18" x2="3" y2="18"/>
                  </svg>
                  总结
                </button>
              </div>
              
              <div class="loading" id="loadingIndicator" style="display: none;">
                <div class="loading-line"></div>
                <div class="loading-line"></div>
                <div class="loading-line"></div>
              </div>
              
              <div class="result-area" id="resultArea" style="display: none;">
                <div class="result-label" id="resultLabel">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                  </svg>
                  翻译结果
                </div>
                <div class="result-content" id="resultContent"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>API 设置</h2>
        <button class="modal-close" onclick="closeSettings()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      
      <div class="modal-body">
        <div class="api-input-group">
          <label>DeepSeek</label>
          <div class="api-input-wrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="m21 2-9.6 9.6"/>
              <path d="m15.5 7.5 3 3L22 7l-3-3"/>
            </svg>
            <input type="password" class="api-input" id="apiKey-deepseek" placeholder="sk-...">
          </div>
        </div>
        
        <div class="api-input-group">
          <label>Groq</label>
          <div class="api-input-wrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="m21 2-9.6 9.6"/>
              <path d="m15.5 7.5 3 3L22 7l-3-3"/>
            </svg>
            <input type="password" class="api-input" id="apiKey-groq" placeholder="gsk_...">
          </div>
        </div>
        
        <div class="api-input-group">
          <label>Kimi (Moonshot)</label>
          <div class="api-input-wrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="m21 2-9.6 9.6"/>
              <path d="m15.5 7.5 3 3L22 7l-3-3"/>
            </svg>
            <input type="password" class="api-input" id="apiKey-kimi" placeholder="sk-...">
          </div>
        </div>
        
        <div class="api-input-group">
          <label>硅基流动</label>
          <div class="api-input-wrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="m21 2-9.6 9.6"/>
              <path d="m15.5 7.5 3 3L22 7l-3-3"/>
            </svg>
            <input type="password" class="api-input" id="apiKey-silicon" placeholder="sk-...">
          </div>
        </div>
      </div>
      
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
        <button class="btn btn-primary" onclick="saveSettings()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          保存设置
        </button>
      </div>
    </div>
  </div>
  
  <script>
    let currentModel = 'deepseek';
    let selectedText = '';
    
    const models = {
      deepseek: 'DeepSeek',
      groq: 'Groq',
      kimi: 'Kimi',
      silicon: '硅基流动'
    };
    
    const actionLabels = {
      translate: '翻译结果',
      explain: '详细解释',
      summarize: '内容总结'
    };
    
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file && file.type === 'application/pdf') {
        document.getElementById('filename').textContent = file.name;
        document.getElementById('previewFilename').textContent = file.name;
        document.getElementById('previewSize').textContent = (file.size / 1024 / 1024).toFixed(2);
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('pdfPreview').style.display = 'block';
      }
    }
    
    function handleTextSelection() {
      const selection = window.getSelection();
      const text = selection.toString().trim();
      if (text && text.length > 0) {
        selectedText = text;
        document.getElementById('selectedTextDisplay').textContent = '"' + text + '"';
        document.getElementById('emptyAi').style.display = 'none';
        document.getElementById('aiActions').style.display = 'block';
      }
    }
    
    function toggleModelMenu() {
      const dropdown = document.getElementById('modelDropdown');
      dropdown.classList.toggle('show');
    }
    
    function selectModel(model) {
      currentModel = model;
      document.getElementById('currentModel').textContent = models[model];
      document.querySelectorAll('.model-option').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent === models[model]) {
          btn.classList.add('active');
        }
      });
      document.getElementById('modelDropdown').classList.remove('show');
    }
    
    function openSettings() {
      document.getElementById('settingsModal').classList.add('show');
      const apiKeys = JSON.parse(localStorage.getItem('paperease_api_keys') || '{}');
      document.getElementById('apiKey-deepseek').value = apiKeys.deepseek || '';
      document.getElementById('apiKey-groq').value = apiKeys.groq || '';
      document.getElementById('apiKey-kimi').value = apiKeys.kimi || '';
      document.getElementById('apiKey-silicon').value = apiKeys.silicon || '';
    }
    
    function closeSettings(event) {
      if (!event || event.target === document.getElementById('settingsModal')) {
        document.getElementById('settingsModal').classList.remove('show');
      }
    }
    
    function saveSettings() {
      const apiKeys = {
        deepseek: document.getElementById('apiKey-deepseek').value,
        groq: document.getElementById('apiKey-groq').value,
        kimi: document.getElementById('apiKey-kimi').value,
        silicon: document.getElementById('apiKey-silicon').value
      };
      localStorage.setItem('paperease_api_keys', JSON.stringify(apiKeys));
      closeSettings();
      alert('设置已保存！');
    }
    
    async function handleAIAction(action) {
      if (!selectedText) {
        alert('请先在 PDF 中选择文本');
        return;
      }
      
      const apiKeys = JSON.parse(localStorage.getItem('paperease_api_keys') || '{}');
      if (!apiKeys[currentModel]) {
        alert('请先在设置中配置 ' + models[currentModel] + ' 的 API Key');
        openSettings();
        return;
      }
      
      document.getElementById('loadingIndicator').style.display = 'flex';
      document.getElementById('resultArea').style.display = 'none';
      
      const prompts = {
        translate: '请将以下英文翻译成中文，保持学术性和准确性：\n\n' + selectedText,
        explain: '请用中文详细解释以下英文内容，包括术语解释和背景知识：\n\n' + selectedText,
        summarize: '请用中文总结以下英文内容的核心要点：\n\n' + selectedText
      };
      
      const endpoints = {
        deepseek: 'https://api.deepseek.com/v1/chat/completions',
        groq: 'https://api.groq.com/openai/v1/chat/completions',
        kimi: 'https://api.moonshot.cn/v1/chat/completions',
        silicon: 'https://api.siliconflow.cn/v1/chat/completions'
      };
      
      const modelIds = {
        deepseek: 'deepseek-chat',
        groq: 'llama3-70b-8192',
        kimi: 'moonshot-v1-8k',
        silicon: 'deepseek-ai/DeepSeek-V2.5'
      };
      
      try {
        const response = await fetch(endpoints[currentModel], {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKeys[currentModel]
          },
          body: JSON.stringify({
            model: modelIds[currentModel],
            messages: [{ role: 'user', content: prompts[action] }],
            stream: true
          })
        });
        
        if (!response.ok) {
          throw new Error('HTTP error! status: ' + response.status);
        }
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let result = '';
        
        document.getElementById('resultLabel').innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg> ' + actionLabels[action];
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                const content = parsed.choices?.[0]?.delta?.content;
                if (content) {
                  result += content;
                  document.getElementById('resultContent').innerHTML = formatMarkdown(result);
                  document.getElementById('loadingIndicator').style.display = 'none';
                  document.getElementById('resultArea').style.display = 'block';
                }
              } catch (e) {}
            }
          }
        }
      } catch (error) {
        document.getElementById('loadingIndicator').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('resultContent').innerHTML = '<p><strong>错误:</strong> ' + error.message + '</p>';
      }
    }
    
    function formatMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>');
    }
    
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.model-selector')) {
        document.getElementById('modelDropdown').classList.remove('show');
      }
    });
  </script>
</body>
</html>
