<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #1a1a1a;
      margin-bottom: 20px;
      font-size: 32px;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .success {
      color: #10b981;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 20px;
    }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ 页面正常显示</h1>
    <p class="success">恭喜！您的浏览器可以正常渲染 HTML 文件</p>
    <p>如果您看到这个页面，说明浏览器工作正常。之前的黑屏可能是由于 JavaScript 错误导致的。</p>
    <button class="btn" onclick="alert('JavaScript 也正常工作！')">测试 JavaScript</button>
  </div>
</body>
</html>
